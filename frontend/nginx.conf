server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Gzip Compression ──
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # ── Security Headers ──
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
  # HSTS: uncomment ONLY after TLS is working (via load balancer or direct certs).
  # Enabling without HTTPS will make the site inaccessible to browsers for max-age duration.
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    try_files $uri /index.html;
  }

  # Prevent caching of index.html to avoid MIME type errors on rebuilds
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
  }

  # Prevent caching of runtime config files — these are injected at container startup
  # and must always reflect the latest environment configuration
  location ~ ^/(config\.js|theme-init\.js)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
  }

  # Vite-hashed assets: aggressive caching (content-hash ensures cache-busting)
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /api/ {
    resolver 127.0.0.11 valid=30s; # Docker DNS
    set $upstream_backend backend;
    proxy_pass http://$upstream_backend:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # ── TLS Configuration (when not using upstream termination) ──
  # To enable TLS directly on nginx, uncomment the following and provide certs:
  #
  # listen 443 ssl;
  # ssl_certificate     /etc/nginx/certs/fullchain.pem;
  # ssl_certificate_key /etc/nginx/certs/privkey.pem;
  # ssl_protocols TLSv1.2 TLSv1.3;
  # ssl_ciphers HIGH:!aNULL:!MD5;
  # ssl_prefer_server_ciphers on;
  #
  # # Redirect HTTP to HTTPS
  # server {
  #   listen 8080;
  #   return 301 https://$host$request_uri;
  # }
}
