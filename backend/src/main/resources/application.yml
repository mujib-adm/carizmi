server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /api

spring:
  config:
    import: "optional:configtree:/run/secrets/"
#  main:
#    banner-mode: off
#    lazy-initialization: true
#    web-application-type: servlet
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 3
      maximum-pool-size: 5
      idle-timeout: 30000
      pool-name: SofumarDevPool
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      repositories:
        enabled: false
  jpa:
    hibernate:
      # Hibernate will only validate the schema. Flyway manages all changes.
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        default_catalog: sofumar
        default_schema: sofumar
#        hbm2ddl:
#          auto: none
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  liquibase:
    enabled: false

jwt:
  issuer: sofumar.portal
  secret: ${JWT_SECRET}
  expirationMinutes: 5
  refreshTokenExpirationMinutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

migration:
  resources:
    dir: backend/src/main/resources

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  cookie:
    # Set to true in production when TLS is enabled
    secure: false
  security:
    max-login-attempts: 5
    lockout-duration-minutes: 15
