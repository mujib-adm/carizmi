server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /api

spring:
  aop:
    proxy-target-class: false
  config:
    import: "optional:configtree:/run/secrets/"
  threads:
    virtual:
      enabled: true
#  main:
#    banner-mode: off
#    lazy-initialization: true
#    web-application-type: servlet
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      minimum-idle: 3
      maximum-pool-size: 5
      idle-timeout: 30000
      pool-name: ${APP_NAME:Carizmi}Pool
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      repositories:
        enabled: false
  jpa:
    hibernate:
      # Hibernate will only validate the schema. Flyway manages all changes.
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        default_catalog: ${DB_NAME:carizmi}
        default_schema: ${DB_NAME:carizmi}
#        hbm2ddl:
#          auto: none
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  liquibase:
    enabled: false

jwt:
  issuer: ${app.branding.jwt-issuer:carizmi.io}
  secret: ${JWT_SECRET}
  expirationMinutes: 5
  refreshTokenExpirationMinutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

migration:
  resources:
    dir: backend/src/main/resources

app:
  name: ${APP_NAME:Carizmi}
  branding:
    api-title: ${APP_BRANDING_API_TITLE:Carizmi API}
    jwt-issuer: ${APP_BRANDING_JWT_ISSUER:carizmi.io}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  cookie:
    # Default to secure (production-safe). Override to false in dev profile for localhost.
    secure: true
    same-site: Strict
  security:
    max-login-attempts: 5
    lockout-duration-minutes: 15

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  wrapper-classes: io.carizmi.framework.data.response.GlobalResponse

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      outboxRelay:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

# Event-Driven Architecture — Outbox Relay
# Controls whether domain events are persisted to the outbox_event table.
carizmi:
  outbox:
    relay:
      enabled: false
