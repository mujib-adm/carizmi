server:
  port: 8080
  servlet:
    context-path: /api

spring:
#  main:
#    banner-mode: off
#    lazy-initialization: true
#    web-application-type: servlet
  datasource:
    url: ${DB_URL:jdbc:mysql://db:3306/sofumar?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:sofumar}
    password: ${DB_PASS:sofumar_pwd}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      #none
    #generate-ddl: false
    show-sql: false
    properties:
      hibernate:
        default_catalog: sofumar
        default_schema: sofumar
#        hbm2ddl:
#          auto: none
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
    #    locations: classpath:db/migration
  liquibase:
    enabled: false
