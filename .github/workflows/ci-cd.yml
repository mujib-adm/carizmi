# ==============================================================================
# CI/CD Pipeline — Carizmi Community Platform
# ==============================================================================
# Triggered on:
#   - Pull Requests targeting 'main' (CI only — build, test, lint, scan)
#   - Push to 'main' (CI + CD — build, test, lint, scan, Docker build & push)
#   - Manual dispatch (for debugging)
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Default: no permissions. Each job declares only what it needs.
permissions: {}

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'
  GAR_LOCATION: us-central1
  GAR_REPO: carizmi-repo

jobs:
  # ============================================================================
  # CI: Backend — Build, Test, Contract Validation
  # ============================================================================
  backend-verify:
    name: "Backend: Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      TESTCONTAINERS_RYUK_DISABLED: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # Single Maven invocation: compile framework → compile backend →
      # run unit tests (Surefire) → run integration tests (Failsafe) →
      # generate OpenAPI contract (exec-maven-plugin in verify phase)
      - name: Build & Test (Framework + Backend)
        run: mvn -B verify -pl framework,backend

      - name: Check for API Contract Drift
        run: |
          if ! git diff --exit-code frontend/src/api/openapi.json; then
            echo "::error::API Contract Drift Detected!"
            echo "::error::The committed 'openapi.json' does not match the backend."
            echo "::error::Run 'mvn install' locally and commit the updated file."
            exit 1
          fi

      - name: Verify Baseline Schema Integrity
        run: |
          git fetch origin main:main 2>/dev/null || true
          if git diff --name-only main...HEAD 2>/dev/null | grep -q "V1__DB_Schema_Baseline.sql"; then
            echo "::error::Baseline schema (V1__DB_Schema_Baseline.sql) must NOT be modified."
            echo "::error::Revert changes and create a new migration file instead."
            exit 1
          fi
          echo "✅ Baseline schema integrity verified."

      # Upload test reports as artifacts for debugging
      - name: Upload Backend Test Reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          retention-days: 14

      # Publish test summary in the GitHub Actions UI
      - name: Publish Test Summary
        if: always()
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5  # v2.6
        with:
          paths: |
            backend/target/surefire-reports/TEST-*.xml
            backend/target/failsafe-reports/TEST-*.xml

  # ============================================================================
  # CI: Frontend — Lint, Type Check, Test, Build
  # ============================================================================
  frontend-verify:
    name: "Frontend: Lint, Test & Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Generate API Client
        working-directory: ./frontend
        run: npm run generate:api

      - name: Lint (ESLint)
        working-directory: ./frontend
        run: npm run lint

      - name: Type Check (TypeScript)
        working-directory: ./frontend
        run: npm run type-check

      - name: Run Tests (Vitest)
        working-directory: ./frontend
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results/junit.xml

      - name: Build
        working-directory: ./frontend
        run: npm run build

      # Upload test reports
      - name: Upload Frontend Test Reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: frontend-test-reports
          path: frontend/test-results/
          retention-days: 14

      - name: Publish Test Summary
        if: always() && hashFiles('frontend/test-results/junit.xml') != ''
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5  # v2.6
        with:
          paths: frontend/test-results/junit.xml

  # ============================================================================
  # CI: Security Scanning (OWASP + npm audit)
  # ============================================================================
  security-scan:
    name: "Security: Dependency Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # Backend: OWASP Dependency-Check
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # Build framework first — backend depends on it and it's not published to Maven Central
      - name: Build Framework Module
        run: mvn -B install -pl framework -DskipTests -q

      - name: OWASP Dependency-Check (Backend)
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c  # main as of 2026-05-24
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: 'carizmi-backend'
          path: './backend'
          format: 'HTML'
          args: >
            --failOnCVSS 9
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
            --enableExperimental
        continue-on-error: true   # Advisory — don't block pipeline on scan failures

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: owasp-dependency-report
          path: reports/
          retention-days: 14

      # Frontend: npm audit
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies (for audit)
        working-directory: ./frontend
        run: npm ci

      - name: npm audit (Frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=critical

  # ============================================================================
  # CD: Docker Build, Scan & Push (only on push to main)
  # ============================================================================
  #
  # Note: The build and scan steps are generic, but the authentication and
  #       push destination target Google Artifact Registry (GCP-specific).
  #
  # Tagging Strategy:
  #   - `main`        → Rolling tag, latest from main branch
  #   - `<sha>`       → Immutable tag tied to exact commit
  #   - `v1.2.3`      → Exact semver (on git tag push only)
  #   - `1.2`         → Major.minor convenience tag (on git tag push only)
  #
  # ============================================================================
  docker-build-push:
    name: "Docker: Build & Push"
    needs: [ backend-verify, frontend-verify, security-scan ]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca  # v3.9.0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7b53cdc2a387814ed14eec026287aac689ae8c9b  # v2.1.9
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f  # v2.2.1

      - name: Configure Docker to use Google Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Set Image Prefix
        run: echo "IMAGE_PREFIX=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/${{ env.GAR_REPO }}/carizmi" >> $GITHUB_ENV

      # ---- Backend Image ----

      - name: Extract Backend Metadata
        id: meta-backend
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & Push Backend Image
        id: build-backend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: true
          sbom: true

      - name: Trivy Scan Backend Image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta-backend.outputs.version }}
          scanners: 'vuln'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          output: 'trivy-backend.txt'

      - name: Upload Trivy Backend Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: trivy-backend-report
          path: trivy-backend.txt
          retention-days: 30

      # ---- Frontend Image ----

      - name: Extract Frontend Metadata
        id: meta-frontend
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & Push Frontend Image
        id: build-frontend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: true
          sbom: true

      - name: Trivy Scan Frontend Image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta-frontend.outputs.version }}
          scanners: 'vuln'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          output: 'trivy-frontend.txt'

      - name: Upload Trivy Frontend Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: trivy-frontend-report
          path: trivy-frontend.txt
          retention-days: 30

      # ---- Build Summary ----
      - name: Post Build Summary
        if: success()
        run: |
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend** | \`${{ steps.meta-backend.outputs.version }}\` | \`${{ steps.build-backend.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | \`${{ steps.meta-frontend.outputs.version }}\` | \`${{ steps.build-frontend.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # ⚠️  PLATFORM-SPECIFIC: Google Cloud Platform (GCP)
  #
  #  The deploy job below is entirely coupled to GCP Cloud Run and Secret
  #  Manager. If deploying to a different provider, replace this job with
  #  the equivalent for that platform.
  # ============================================================================

  # ============================================================================
  # CD: Deploy to Google Cloud Run (Production)
  # ============================================================================
  deploy:
    name: "Deploy to Cloud Run"
    needs: [ docker-build-push ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
    timeout-minutes: 15
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7b53cdc2a387814ed14eec026287aac689ae8c9b  # v2.1.9
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522  # v2.7.6
        with:
          service: carizmi-backend
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/${{ env.GAR_REPO }}/carizmi-backend:main
          region: us-central1
          env_vars: |
            SPRING_PROFILES_ACTIVE=prod
            DB_URL=${{ vars.PROD_DB_URL }}
            DB_USER=${{ vars.PROD_DB_USER }}
            REDIS_HOST=${{ vars.PROD_REDIS_HOST }}
            ADMIN_DEFAULT_FIRSTNAME=${{ vars.ADMIN_DEFAULT_FIRSTNAME }}
            ADMIN_DEFAULT_LASTNAME=${{ vars.ADMIN_DEFAULT_LASTNAME }}
            ADMIN_DEFAULT_EMAIL=${{ vars.ADMIN_DEFAULT_EMAIL }}
            ADMIN_DEFAULT_USERNAME=${{ vars.ADMIN_DEFAULT_USERNAME }}
            JAVA_OPTS=${{ vars.PROD_JAVA_OPTS }}
          secrets: |
            DB_PASS=DB_PASSWORD:latest
            JWT_SECRET=JWT_SECRET:latest
            ADMIN_DEFAULT_PASSWORD=ADMIN_DEFAULT_PASSWORD:latest
          flags: >
            --network=default
            --subnet=default
            --vpc-egress=private-ranges-only
            --allow-unauthenticated
            --execution-environment=gen2
            --cpu=1
            --memory=1536Mi
            --cpu-boost

      - name: Deploy Frontend to Cloud Run
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522  # v2.7.6
        with:
          service: carizmi-frontend
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/${{ env.GAR_REPO }}/carizmi-frontend:main
          region: us-central1
          env_vars: |
            VITE_API_URL=${{ vars.PROD_API_URL }}
            APP_ORG_NAME=${{ vars.APP_ORG_NAME }}
            APP_HEADER_TITLE=${{ vars.APP_HEADER_TITLE }}
            APP_HEADER_SUBTITLE=${{ vars.APP_HEADER_SUBTITLE }}
            APP_LOGO_ALT=${{ vars.APP_LOGO_ALT }}
            APP_COPYRIGHT=${{ vars.APP_COPYRIGHT }}
          flags: >
            --allow-unauthenticated
            --execution-environment=gen1
            --cpu=1
            --memory=512Mi
            --port=8080

      - name: Update Backend CORS Origins
        run: |
          gcloud run services update carizmi-backend \
            --region=us-central1 \
            --update-env-vars="^||^APP_CORS_ALLOWED_ORIGINS=${{ vars.PROD_CUSTOM_DOMAINS }}"

      - name: Post Deployment Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend URL:** ${{ steps.deploy-frontend.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend URL:** ${{ steps.deploy-backend.outputs.url }}" >> $GITHUB_STEP_SUMMARY
