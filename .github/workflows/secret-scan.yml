# ==============================================================================
# Secret Scanning — Carizmi Community Platform
# ==============================================================================
# Scans the full Git history for accidentally committed secrets (API keys,
# passwords, tokens). Uses trufflesecurity/trufflehog official GitHub Action.
#
# Runs on:
#   - PRs (to catch secrets BEFORE they reach main)
#   - Push to main (to catch secrets that bypass PR)
#   - Manual dispatch (for ad-hoc scans)
# ==============================================================================

name: Secret Scan (TruffleHog)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog-scan:
    name: "Security: Secret Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6  # v3.94.3
        with:
          extra_args: --only-verified