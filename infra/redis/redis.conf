# Redis production configuration
# Port to listen on
port 6379

# Bind to all interfaces (protected by Docker network)
bind 0.0.0.0

# Disable protected mode as we rely on Docker networking
protected-mode no

# Performance & Memory Tuning
# Max memory - limited by Docker container (512MB in compose)
# We set it slightly lower to allow overhead
maxmemory 400mb
maxmemory-policy allkeys-lru

# Persistence (RDB)
# Save the DB on disk if:
# - 900 seconds (15 min) and at least 1 key changed
# - 300 seconds (5 min) and at least 10 keys changed
# - 60 seconds and at least 10000 keys changed
save 900 1
save 300 10
save 60 10000

# Directory for persistence files
dir /data
dbfilename dump.rdb

# Security: Disable dangerous commands to prevent accidental or malicious data loss
rename-command CONFIG ""
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# Logging
loglevel notice
logfile ""
